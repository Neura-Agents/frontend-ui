# Public Site
server {
    listen 80;
    server_name wormlabs.in www.wormlabs.in;

    # DNS resolver for public domains
    resolver 8.8.8.8 1.1.1.1 valid=300s;

    location / {
        root /usr/share/nginx/html/public;
        index index.html index.htm;
        try_files $uri $uri/ /index.html;
    }

    # Proxy backend requests to Kong Gateway via Public Domain
    location /backend {
        set $gateway_upstream https://api.wormlabs.in;
        proxy_pass $gateway_upstream;
        
        # Essential for HTTPS proxying
        proxy_ssl_server_name on;
        proxy_set_header Host api.wormlabs.in;

        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html/public;
    }
}

